#5. account Help
help.title = يساعد
help.description = اعثر على إرشادات سريعة حول التدفقات الرئيسية في Fliply.
help.quickStart.title = البدء السريع
help.quickStart.body = استخدم شريط التنقل السفلي للتنقل بين الشاشات الرئيسية. افتح حسابك في أي وقت لتحديث ملفك الشخصي، أو تغيير اللغة، أو تغيير كلمة المرور.
help.roleGuide.title.teacher = دليل المعلم
help.roleGuide.title.student = دليل الطالب
help.roleGuide.body.teacher = يعمل المعلمون بشكل أساسي في الفصول الدراسية. أنشئ فصلًا دراسيًا، وافتحه لمراجعة الطلاب، وأضف مجموعات البطاقات التعليمية لتوفير مواد دراسية جاهزة للفصل.
help.roleGuide.body.student = يتنقل الطلاب بشكل أساسي بين الفصول الدراسية والبطاقات التعليمية والاختبارات. افتح فصلًا دراسيًا لمراجعة المجموعات المتاحة، وادرس بطاقاتك التعليمية، واستخدم الاختبارات للتدريب.
help.commonTasks.title = المهام الشائعة
help.commonTasks.body.teacher = 1. إنشاء فصل دراسي: انتقل إلى الفصول الدراسية واختر + إضافة المزيد من الفصول الدراسية.\n\n2. إضافة مواد تعليمية: افتح فصلًا دراسيًا، ثم أضف مجموعة بطاقات تعليمية.\n\n3. إدارة إعدادات الحساب: افتح "الحساب" لتعديل ملفك الشخصي أو لغتك أو كلمة مرورك.
help.commonTasks.body.student =  1. افتح فصولك الدراسية: انتقل إلى "الفصول الدراسية" لمراجعة الفصول التي انضممت إليها.\n\n2. دراسة البطاقات التعليمية: افتح "البطاقات التعليمية" لمراجعة بطاقاتك أو إضافة بطاقة جديدة.\n\n3. التدرب على الاختبارات القصيرة: انتقل إلى "الاختبارات القصيرة"، وأدخل عدد الأسئلة، وابدأ الاختبار القصير المُنشأ.
help.faq.title = الأسئلة الشائعة
help.faq.body.teacher = س: أين أضيف مواد تعليمية؟\nج: افتح فصلًا دراسيًا أولًا، ثم أضف أو افتح مجموعات البطاقات التعليمية الخاصة به.\n\nس: لماذا لا أرى البطاقات التعليمية أو الاختبارات في القائمة السفلية؟\nج: تركز حسابات المعلمين على الصفحة الرئيسية والفصول الدراسية والحساب، لذا فإن أدوات الدراسة الخاصة بالطلاب فقط مخفية.\n\nس: كيف أغير اللغة أو كلمة المرور؟\nج: افتح الحساب، ثم اختر اللغة أو تغيير كلمة المرور.
help.faq.body.student = س: لماذا لا يمكنني إنشاء اختبار؟\nج: يتطلب إنشاء الاختبار وجود بطاقات تعليمية متاحة. أضف البطاقات التعليمية أولًا أو افتح فصلًا دراسيًا يحتوي بالفعل على مواد دراسية.\n\nس: أين أجد آخر أنشطتي؟\nج: تعرض الصفحة الرئيسية آخر فصل دراسي وأحدث اختبار عند توفرهما.\n\nس: كيف أغير اللغة أو كلمة المرور؟\nج: افتح الحساب، ثم اختر اللغة أو تغيير كلمة المرور.

