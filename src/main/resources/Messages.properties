help.quickStart.title = Quick Start
help.quickStart.body = Use the bottom navigation to move between the main screens. Open Account at any time to update your profile, switch language, or change your password.
help.roleGuide.title.teacher = Teacher Guide
help.roleGuide.title.student = Student Guide
help.roleGuide.body.teacher = Teachers mainly work in Classes. Create a class, open it to review students, and add flashcard sets so the class has study material ready.
help.roleGuide.body.student = Students mainly move between Classes, Flashcards, and Quizzes. Open a class to review available sets, study your own cards in Flashcards, and use Quizzes for practice.
help.commonTasks.title = Common Tasks
help.commonTasks.body.teacher = 1. Create a class: Go to Classes and choose + Add more classes.\n\n2. Add learning material: Open a class, then add a flashcard set.\n\n3. Manage account settings: Open Account to edit your profile, language, or password.
help.commonTasks.body.student = 1. Open your classes: Go to Classes to review the classes you joined.\n\n2. Study flashcards: Open Flashcards to review your cards or add a new one.\n\n3. Practice with quizzes: Go to Quizzes, enter a question count, and start the generated quiz.
help.faq.title = FAQ
help.faq.body.teacher = Q: Where do I add learning material?\nA: Open a class first, then add or open its flashcard sets.\n\nQ: Why do I not see Flashcards or Quizzes in the bottom menu?\nA: Teacher accounts focus on Home, Classes, and Account, so student-only study tools are hidden.\n\nQ: How do I change language or password?\nA: Open Account, then choose Language or Change Password.
help.faq.body.student = Q: Why can I not generate a quiz?\nA: Quiz generation needs available flashcards. Add flashcards first or open a class that already has study material.\n\nQ: Where can I find my latest activity?\nA: Home shows your latest class and most recent quiz when they are available.\n\nQ: How do I change language or password?\nA: Open Account, then choose Language or Change Password.
