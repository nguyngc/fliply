#4. account About
about.title = Tietoa meistä
about.description=Fliply on verkkopohjainen muistikorttioppimissovellus, joka on suunniteltu sekä opiskelijoille että opettajille. Se tarjoaa yksinkertaisen ja tehokkaan tavan luoda, järjestää ja opiskella oppimateriaaleja yhdessä paikassa.\n\nOlitpa sitten valmistautumassa kokeisiin, opettamassa tuntia tai oppimassa jotain uutta, Fliply on rakennettu tekemään opiskelusta kiinnostavampaa ja tehokkaampaa.

