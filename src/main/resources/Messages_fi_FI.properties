#4. account About
about.title = Tietoa meist\u00E4
about.description=Fliply on verkkopohjainen muistikorttioppimissovellus, joka on suunniteltu sek\u00E4 opiskelijoille ett\u00E4 opettajille. Se tarjoaa yksinkertaisen ja tehokkaan tavan luoda, j\u00E4rjest\u00E4\u00E4 ja opiskella oppimateriaaleja yhdess\u00E4 paikassa.\n\nOlitpa sitten valmistautumassa kokeisiin, opettamassa tuntia tai oppimassa jotain uutta, Fliply on rakennettu tekem\u00E4\u00E4n opiskelusta kiinnostavampaa ja tehokkaampaa.

