#5. account Help
help.title = Ohje
help.description = Löydä pikaohjeita Fliplyn päätyönkulkuihin.
help.quickStart.title = Pika-aloitus
help.quickStart.body = Käytä alareunassa olevaa navigointia siirtyäksesi päänäyttöjen välillä. Avaa tili milloin tahansa päivittääksesi profiilisi, vaihtaaksesi kieltä tai vaihtaaksesi salasanasi.
help.roleGuide.title.teacher = Opettajan opas
help.roleGuide.title.student = Opiskelijan opas
help.roleGuide.body.teacher = Opettajat työskentelevät pääasiassa luokissa. Luo luokka, avaa se tarkastellaksesi oppilaita ja lisää muistikorttisettejä, jotta luokalla on opiskelumateriaalia valmiina.
help.roleGuide.body.student = Oppilaat liikkuvat pääasiassa luokkien, muistikorttien ja tietokilpailujen välillä. Avaa luokka tarkastellaksesi saatavilla olevia sarjoja, opiskellaksesi omia korttejasi muistikorteissa ja käyttääksesi tietokilpailuja harjoitteluun.
help.commonTasks.title = Yleiset tehtävät
help.commonTasks.body.teacher = 1. Luo luokka: Siirry kohtaan Luokat ja valitse + Lisää lisää luokkia.\n\n2. Lisää oppimateriaali: Avaa luokka ja lisää sitten muistikorttisetti.\n\n3. Tilin asetusten hallinta: Avaa Tili muokataksesi profiiliasi, kieltäsi tai salasanaasi.
help.commonTasks.body.student = 1. Avaa luokkasi: Siirry kohtaan Tunnit tarkastellaksesi tunteja, joille olet liittynyt.\n\n2. Opiskelukortit: Avaa Muistikortit tarkastellaksesi korttejasi tai lisätäksesi uusia.\n\n3. Harjoittele tietokilpailujen kanssa: Siirry kohtaan Tietokilpailut, anna kysymysten määrä ja aloita luotu tietokilpailu.
help.faq.title = Usein kysytyt kysymykset
help.faq.body.teacher = K: Mihin lisään oppimateriaalia?\nV: Avaa ensin luokka ja lisää tai avaa sitten sen muistikorttisarjat.\n\nK: Miksi en näe Muistikortteja tai Tietokilpailuja alavalikossa?\nV: Opettajan tilit keskittyvät Kotiin, Tunnit ja Tili -osioon, joten vain opiskelijoille tarkoitetut opiskelutyökalut ovat piilossa.\n\nK: Miten vaihdan kielen tai salasanan?\nV: Avaa Tili ja valitse sitten Kieli tai Vaihda salasana.
help.faq.body.student = K: Miksi en voi luoda tietokilpailua?\nV: Tietokilpailun luomiseen tarvitaan saatavilla olevia muistikortteja. Lisää ensin muistikortit tai avaa kurssi, jolla on jo opiskelumateriaalia.\n\nK: Mistä löydän uusimman aktiviteettini?\nV: Etusivu näyttää uusimman kurssin ja uusimman tietokilpailun, kun ne ovat saatavilla.\n\nK: Miten vaihdan kielen tai salasanan?\nV: Avaa tili ja valitse sitten Kieli tai Vaihda salasana.

