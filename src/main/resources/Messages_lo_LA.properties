#4. account About
about.title = ກ່ຽວກັບ
about.description = Fliply ເປັນຄໍາຮ້ອງສະຫມັກການຮຽນຮູ້ flashcard ອອນໄລນ໌ທີ່ຖືກອອກແບບມາສໍາລັບນັກຮຽນແລະຄູອາຈານ. ມັນສະຫນອງວິທີທີ່ງ່າຍດາຍແລະມີປະສິດທິພາບໃນການສ້າງ, ຈັດຕັ້ງ, ແລະການສຶກສາອຸປະກອນການຮຽນຮູ້ຢູ່ໃນສະຖານທີ່ດຽວ.\n\nບໍ່ວ່າທ່ານກໍາລັງກະກຽມສໍາລັບການສອບເສັງ, ການສອນຫ້ອງຮຽນ, ຫຼືການຮຽນຮູ້ສິ່ງໃຫມ່, Fliply ຖືກສ້າງຂຶ້ນເພື່ອເຮັດໃຫ້ການສຶກສາມີສ່ວນຮ່ວມແລະປະສິດທິພາບຫຼາຍ.

