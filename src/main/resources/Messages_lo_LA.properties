#5. account Help
help.title = ຊ່ວຍເຫຼືອ
help.description = ຊອກຫາຄໍາແນະນໍາດ່ວນສໍາລັບກະແສຫຼັກໃນ Fliply.
help.quickStart.title = ເລີ່ມດ່ວນ
help.quickStart.body = ໃຊ້ການນໍາທາງລຸ່ມເພື່ອຍ້າຍລະຫວ່າງໜ້າຈໍຫຼັກ. ເປີດບັນຊີໄດ້ທຸກເວລາເພື່ອອັບເດດໂປຣໄຟລ໌ຂອງທ່ານ, ສະຫຼັບພາສາ ຫຼືປ່ຽນລະຫັດຜ່ານຂອງທ່ານ.
help.roleGuide.title.teacher = ຄູ່ມືຄູ
help.roleGuide.title.student = ຄູ່ມືນັກສຶກສາ
help.roleGuide.body.teacher = ຄູສ່ວນຫຼາຍເຮັດວຽກຢູ່ໃນຫ້ອງຮຽນ. ສ້າງຫ້ອງຮຽນ, ເປີດມັນເພື່ອທົບທວນນັກຮຽນ, ແລະເພີ່ມຊຸດ flashcard ເພື່ອໃຫ້ຫ້ອງຮຽນມີອຸປະກອນການສຶກສາພ້ອມ.
help.roleGuide.body.student = ນັກຮຽນສ່ວນໃຫຍ່ຍ້າຍລະຫວ່າງຫ້ອງຮຽນ, ບັດ Flash ແລະແບບສອບຖາມ. ເປີດຫ້ອງຮຽນເພື່ອທົບທວນຊຸດທີ່ມີຢູ່, ສຶກສາບັດຂອງທ່ານເອງໃນ Flashcards, ແລະໃຊ້ Quizzes ສໍາລັບການປະຕິບັດ.
help.commonTasks.title = ໜ້າວຽກທົ່ວໄປ
help.commonTasks.body.teacher = 1. ສ້າງຊັ້ນຮຽນ: ໄປທີ່ຫ້ອງຮຽນ ແລະເລືອກ + ເພີ່ມຊັ້ນຮຽນເພີ່ມເຕີມ.\n\n2. ເພີ່ມອຸປະກອນການຮຽນ: ເປີດຫ້ອງຮຽນ, ຈາກນັ້ນເພີ່ມຊຸດ flashcard.\n\n3. ຈັດການການຕັ້ງຄ່າບັນຊີ: ເປີດບັນຊີເພື່ອແກ້ໄຂໂປຣໄຟລ໌, ພາສາ ຫຼືລະຫັດຜ່ານຂອງທ່ານ.
help.commonTasks.body.student = 1. ເປີດຊັ້ນຮຽນຂອງທ່ານ: ໄປທີ່ຫ້ອງຮຽນເພື່ອກວດເບິ່ງຊັ້ນຮຽນທີ່ທ່ານເຂົ້າຮ່ວມ.\n\n2. ສຶກສາບັດ Flash: ເປີດ Flashcards ເພື່ອກວດເບິ່ງບັດຂອງທ່ານ ຫຼືເພີ່ມອັນໃໝ່.\n\n3. ປະຕິບັດແບບສອບຖາມ: ໄປທີ່ Quizzes, ໃສ່ຈໍານວນຄໍາຖາມ, ແລະເລີ່ມຕົ້ນແບບສອບຖາມທີ່ສ້າງຂຶ້ນ.
help.faq.title = FAQ
help.faq.body.teacher = Q: ຂ້ອຍຈະເພີ່ມອຸປະກອນການຮຽນຢູ່ໃສ?\nA: ເປີດຫ້ອງຮຽນກ່ອນ, ຈາກນັ້ນເພີ່ມ ຫຼືເປີດຊຸດ flashcard ຂອງມັນ.\n\nQ: ເປັນຫຍັງຂ້ອຍຈຶ່ງບໍ່ເຫັນ Flashcards ຫຼື Quizzes ໃນເມນູລຸ່ມສຸດ?\nA: ບັນຊີຄູເນັ້ນໃສ່ Home, Classes, ແລະ Account, ສະນັ້ນ ເຄື່ອງມືການສຶກສາສຳລັບນັກຮຽນເທົ່ານັ້ນຖືກເຊື່ອງໄວ້.\n\nQ: ເປີດພາສາ ຫຼືປ່ຽນລະຫັດຜ່ານແນວໃດ?
help.faq.body.student = Q: ເປັນຫຍັງຂ້ອຍຈຶ່ງບໍ່ສາມາດສ້າງແບບສອບຖາມໄດ້?\nA: ການສ້າງແບບສອບຖາມຕ້ອງການ flashcards ທີ່ມີຢູ່. ເພີ່ມ flashcards ກ່ອນ ຫຼືເປີດຫ້ອງຮຽນທີ່ມີອຸປະກອນການຮຽນຢູ່ກ່ອນແລ້ວ.\n\nQ: ຂ້ອຍສາມາດຊອກຫາການເຄື່ອນໄຫວຫຼ້າສຸດຂອງຂ້ອຍຢູ່ໃສ?\nA: ຫນ້າທໍາອິດສະແດງຫ້ອງຮຽນຫຼ້າສຸດຂອງເຈົ້າ ແລະແບບສອບຖາມຫຼ້າສຸດເມື່ອເຂົາເຈົ້າມີໃຫ້.\n\nQ: ຂ້ອຍຈະປ່ຽນພາສາ ຫຼືລະຫັດຜ່ານໄດ້ແນວໃດ?\nA: ເປີດບັນຊີ, ຈາກນັ້ນເລືອກພາສາ ຫຼືປ່ຽນລະຫັດຜ່ານ.

