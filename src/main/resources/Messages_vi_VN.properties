#4. account About
about.title = Về chúng tôi
about.description = Fliply là một ứng dụng học tập trực tuyến sử dụng thẻ ghi nhớ, được thiết kế dành cho cả học sinh và giáo viên. Ứng dụng này cung cấp một cách đơn giản và hiệu quả để tạo, sắp xếp và học tập tài liệu tại một nơi duy nhất.\n\nCho dù bạn đang chuẩn bị cho kỳ thi, giảng dạy hay học hỏi điều gì đó mới, Fliply được xây dựng để giúp việc học tập trở nên thú vị và hiệu quả hơn.

