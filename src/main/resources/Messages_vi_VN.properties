#4. account About
about.title = V\u1EC1 ch\u00FAng t\u00F4i
about.description = Fliply l\u00E0 m\u1ED9t \u1EE9ng d\u1EE5ng h\u1ECDc t\u1EADp tr\u1EF1c tuy\u1EBFn s\u1EED d\u1EE5ng th\u1EBB ghi nh\u1EDB, \u0111\u01B0\u1EE3c thi\u1EBFt k\u1EBF d\u00E0nh cho c\u1EA3 h\u1ECDc sinh v\u00E0 gi\u00E1o vi\u00EAn. \u1EE8ng d\u1EE5ng n\u00E0y cung c\u1EA5p m\u1ED9t c\u00E1ch \u0111\u01A1n gi\u1EA3n v\u00E0 hi\u1EC7u qu\u1EA3 \u0111\u1EC3 t\u1EA1o, s\u1EAFp x\u1EBFp v\u00E0 h\u1ECDc t\u1EADp t\u00E0i li\u1EC7u t\u1EA1i m\u1ED9t n\u01A1i duy nh\u1EA5t.\n\nCho d\u00F9 b\u1EA1n \u0111ang chu\u1EA9n b\u1ECB cho k\u1EF3 thi, gi\u1EA3ng d\u1EA1y hay h\u1ECDc h\u1ECFi \u0111i\u1EC1u g\u00EC \u0111\u00F3 m\u1EDBi, Fliply \u0111\u01B0\u1EE3c x\u00E2y d\u1EF1ng \u0111\u1EC3 gi\u00FAp vi\u1EC7c h\u1ECDc t\u1EADp tr\u1EDF n\u00EAn th\u00FA v\u1ECB v\u00E0 hi\u1EC7u qu\u1EA3 h\u01A1n.

