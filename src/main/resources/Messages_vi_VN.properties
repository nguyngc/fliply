#5. account Help
help.title = Trợ giúp
help.description = Tìm hướng dẫn nhanh cho các quy trình chính trong Fliply.
help.quickStart.title = Hướng dẫn nhanh
help.quickStart.body = Sử dụng thanh điều hướng phía dưới để di chuyển giữa các màn hình chính. Mở Tài khoản bất cứ lúc nào để cập nhật hồ sơ, chuyển đổi ngôn ngữ hoặc thay đổi mật khẩu.
help.roleGuide.title.teacher = Hướng dẫn dành cho giáo viên
help.roleGuide.title.student = Hướng dẫn dành cho học sinh
help.roleGuide.body.teacher = Giáo viên chủ yếu làm việc trong Lớp học. Tạo một lớp học, mở lớp học để xem xét học sinh và thêm các bộ thẻ ghi nhớ để lớp học có tài liệu học tập sẵn sàng.
help.roleGuide.body.student = Học sinh chủ yếu di chuyển giữa Lớp học, Thẻ ghi nhớ và Bài kiểm tra. Mở một lớp học để xem lại các bộ thẻ có sẵn, học thẻ của riêng bạn trong Thẻ ghi nhớ và sử dụng Bài kiểm tra để luyện tập.
help.commonTasks.title = Nhiệm vụ thường gặp
help.commonTasks.body.teacher = 1. Tạo một lớp học: Vào Lớp học và chọn + Thêm lớp học.\n\n2. Thêm tài liệu học tập: Mở một lớp học, sau đó thêm bộ thẻ ghi nhớ.\n\n3. Quản lý cài đặt tài khoản: Mở Tài khoản để chỉnh sửa hồ sơ, ngôn ngữ hoặc mật khẩu của bạn.
help.commonTasks.body.student = 1. Mở các lớp học của bạn: Vào Lớp học để xem lại các lớp học bạn đã tham gia.\n\n2. Học thẻ ghi nhớ: Mở Thẻ ghi nhớ để xem lại thẻ của bạn hoặc thêm thẻ mới.\n\n3. Luyện tập với bài kiểm tra: Vào Bài kiểm tra, nhập số lượng câu hỏi và bắt đầu bài kiểm tra được tạo.
help.faq.title = Câu hỏi thường gặp
help.faq.body.teacher = Hỏi: Tôi thêm tài liệu học tập ở đâu?\nTrả lời: Trước tiên, hãy mở một lớp học, sau đó thêm hoặc mở bộ thẻ ghi nhớ của lớp đó.\n\nHỏi: Tại sao tôi không thấy Thẻ ghi nhớ hoặc Bài kiểm tra trong menu dưới cùng?\nTrả lời: Tài khoản giáo viên tập trung vào Trang chủ, Lớp học và Tài khoản, vì vậy các công cụ học tập chỉ dành cho học sinh bị ẩn.\n\nHỏi: Làm thế nào để thay đổi ngôn ngữ hoặc mật khẩu?\nTrả lời: Mở Tài khoản, sau đó chọn Ngôn ngữ hoặc Thay đổi mật khẩu.
help.faq.body.student = Hỏi: Tại sao tôi không thể tạo bài kiểm tra?\nTrả lời: Việc tạo bài kiểm tra cần có thẻ ghi nhớ. Hãy thêm thẻ ghi nhớ trước hoặc mở một lớp học đã có tài liệu học tập.\n\nHỏi: Tôi có thể tìm hoạt động gần đây nhất của mình ở đâu?\nTrả lời: Trang chủ hiển thị lớp học gần đây nhất và bài kiểm tra gần đây nhất của bạn khi có sẵn.\n\nHỏi: Làm thế nào để thay đổi ngôn ngữ hoặc mật khẩu?\nTrả lời: Mở Tài khoản, sau đó chọn Ngôn ngữ hoặc Thay đổi mật khẩu.

