#5. account Help
help.title = 도움말
help.description = Fliply의 주요 사용 방법에 대한 빠른 안내를 찾아보세요.
help.quickStart.title = 빠른 시작
help.quickStart.body = 하단 탐색 메뉴를 사용하여 주요 화면 간에 이동하세요. 언제든지 계정을 열어 프로필을 업데이트하거나, 언어를 변경하거나, 비밀번호를 변경할 수 있습니다.
help.roleGuide.title.teacher = 교사 가이드
help.roleGuide.title.student = 학생 가이드
help.roleGuide.body.teacher = 교사는 주로 수업에서 활동합니다. 수업을 만들고, 수업을 열어 학생들을 확인하고, 플래시카드 세트를 추가하여 수업에 필요한 학습 자료를 준비하세요.
help.roleGuide.body.student = 학생은 주로 수업, 플래시카드, 퀴즈를 이용합니다. 수업을 열어 사용 가능한 세트를 확인하고, 플래시카드에서 자신의 카드를 학습하고, 퀴즈를 통해 연습하세요.
help.commonTasks.title = 일반적인 작업
help.commonTasks.body.teacher = 1. 수업 만들기: 수업으로 이동하여 + 수업 추가를 선택합니다.\n\n2. 학습 자료 추가: 수업을 열고 플래시카드 세트를 추가하세요.\n\n3. 계정 설정 관리: 계정을 열어 프로필, 언어 또는 비밀번호를 수정하세요.
help.commonTasks.body.student = 1. 수업 열기: 수업으로 이동하여 수강 중인 수업을 확인하세요.\n\n2. 플래시카드 학습: 플래시카드를 열어 카드를 복습하거나 새 카드를 추가하세요.\n\n3. 퀴즈로 연습하기: 퀴즈로 이동하여 문제 수를 입력하고 생성된 퀴즈를 시작하세요.
help.faq.title = 자주 묻는 질문(FAQ)
help.faq.body.teacher = 질문: 학습 자료는 어디에 추가하나요?\n답변: 먼저 수업을 열고 플래시카드 세트를 추가하거나 여세요.\n\n질문: 하단 메뉴에 플래시카드나 퀴즈가 보이지 않는 이유는 무엇인가요?\n답변: 교사 계정은 홈, 수업, 계정에 중점을 두기 때문에 학생 전용 학습 도구는 숨겨져 있습니다.\n\n질문: 언어나 비밀번호는 어떻게 변경하나요?\n답변: 계정을 열고 언어 또는 비밀번호 변경을 선택하세요.
help.faq.body.student = 질문: 퀴즈를 생성할 수 없는 이유는 무엇인가요?\n답변: 퀴즈를 생성하려면 플래시카드가 필요합니다. 먼저 플래시카드를 추가하거나 학습 자료가 이미 있는 수업을 여세요.\n\n질문: 최근 활동은 어디에서 확인할 수 있나요?\n답변: 홈 화면에서 최근 수업과 퀴즈(사용 가능한 경우)를 확인할 수 있습니다.\n\n질문: 언어나 비밀번호는 어떻게 변경하나요?\n답변: 계정을 열고 언어 또는 비밀번호 변경을 선택하세요.

