#4. account About
about.title = 소개
about.description = Fliply는 학생과 교사 모두를 위해 설계된 온라인 플래시카드 학습 애플리케이션입니다. 학습 자료를 한 곳에서 간편하고 효과적으로 만들고, 정리하고, 학습할 수 있도록 도와줍니다.\n\n시험 준비, 수업 진행, 새로운 학습 등 어떤 목적이든 Fliply는 더욱 흥미롭고 효율적인 학습 경험을 제공합니다.

