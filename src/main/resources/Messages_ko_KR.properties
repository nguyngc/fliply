#4. account About
about.title = \uC18C\uAC1C
about.description = Fliply\uB294 \uD559\uC0DD\uACFC \uAD50\uC0AC \uBAA8\uB450\uB97C \uC704\uD574 \uC124\uACC4\uB41C \uC628\uB77C\uC778 \uD50C\uB798\uC2DC\uCE74\uB4DC \uD559\uC2B5 \uC560\uD50C\uB9AC\uCF00\uC774\uC158\uC785\uB2C8\uB2E4. \uD559\uC2B5 \uC790\uB8CC\uB97C \uD55C \uACF3\uC5D0\uC11C \uAC04\uD3B8\uD558\uACE0 \uD6A8\uACFC\uC801\uC73C\uB85C \uB9CC\uB4E4\uACE0, \uC815\uB9AC\uD558\uACE0, \uD559\uC2B5\uD560 \uC218 \uC788\uB3C4\uB85D \uB3C4\uC640\uC90D\uB2C8\uB2E4.\n\n\uC2DC\uD5D8 \uC900\uBE44, \uC218\uC5C5 \uC9C4\uD589, \uC0C8\uB85C\uC6B4 \uD559\uC2B5 \uB4F1 \uC5B4\uB5A4 \uBAA9\uC801\uC774\uB4E0 Fliply\uB294 \uB354\uC6B1 \uD765\uBBF8\uB86D\uACE0 \uD6A8\uC728\uC801\uC778 \uD559\uC2B5 \uACBD\uD5D8\uC744 \uC81C\uACF5\uD569\uB2C8\uB2E4.

